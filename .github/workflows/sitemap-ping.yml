name: IndexNow — Notify Search Engines

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger with custom lookback
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours to look back for new articles'
        default: '24'
      all:
        description: 'Submit ALL articles (initial seeding)'
        type: boolean
        default: false

  # Run on push to main (new content deployed)
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'src/**'

jobs:
  submit-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs via IndexNow
        run: |
          HOURS="${{ github.event.inputs.hours || '24' }}"
          ALL="${{ github.event.inputs.all || 'false' }}"

          echo "Submitting recent URLs to IndexNow (lookback: ${HOURS}h, all: ${ALL})..."

          PARAMS="?hours=${HOURS}"
          if [ "$ALL" = "true" ]; then
            PARAMS="${PARAMS}&all=true"
          fi

          response=$(curl -s "https://copus.network/scheduled/sitemap-ping${PARAMS}")
          echo "$response" | python3 -m json.tool || echo "$response"

          # Check success
          success=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('success', False))" 2>/dev/null || echo "unknown")
          urls=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('urlsSubmitted', 0))" 2>/dev/null || echo "0")

          echo "Success: $success, URLs submitted: $urls"

      - name: Summary
        run: |
          echo "## IndexNow Submission Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://copus.network" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Method:** Batch POST to api.indexnow.org" >> $GITHUB_STEP_SUMMARY
          echo "- **Engines:** Bing, Yandex, Seznam, Naver" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Google does not support IndexNow — uses natural crawling via [sitemap](https://copus.network/sitemap.xml)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For Google indexing, submit sitemap via [Google Search Console](https://search.google.com/search-console)." >> $GITHUB_STEP_SUMMARY
